<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Finance App — Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/store.js"></script>
<style>
.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:20px; }
.chart-title { font-size:0.88rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:16px; }
.chart-wrap { position:relative; height:280px; }
.lifetime-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.lkpi { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
.lkpi-label { font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
.lkpi-value { font-size:1.5rem; font-weight:700; font-family:'IBM Plex Mono',monospace; }
.lkpi-sub { font-size:0.78rem; color:var(--text-muted); margin-top:4px; }
.drill-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:20px; }
.year-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
.year-tab { background:var(--bg3); border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:5px 14px; font-size:0.84rem; font-weight:600; cursor:pointer; transition:all 0.15s; }
.year-tab:hover { border-color:var(--teal); color:var(--teal); }
.year-tab.active { background:var(--teal); border-color:var(--teal); color:#fff; }
</style>
</head>
<body>
<div id="loadingOverlay"><div class="loader-spinner"></div><div class="loader-text" id="loadingMsg">Loading your data from Google Drive…</div></div>

<nav class="nav">
  <a class="nav-brand" href="index.html">💰 MyFinance</a>
  <div class="nav-links">
    <a href="index.html" class="active">Dashboard</a>
    <a href="input.html" class="">Finance Input</a>
    <a href="investments.html" class="">Investments</a>
    <a href="stocks.html" class="">Stocks</a>
    <a href="assets.html" class="">Assets</a>
  </div>
  <div class="nav-right">
    <span id="driveStatus" class="drive-status-text"></span>
    <span id="authStatus" class="auth-badge"></span>
    <div class="nav-btn-row">
      
      <button id="authBtn" class="btn btn-sm btn-ghost" onclick="signIn()">🔑 Sign in</button>
      <button class="btn btn-sm btn-ghost" onclick="refreshFromDrive()" title="Refresh from Drive">🔄</button>
      <button class="btn btn-sm btn-teal" onclick="driveSave()" title="Save to Drive">☁ Save</button>
      <button class="btn btn-sm btn-ghost" onclick="driveBackup()" title="Create backup">💾</button>
      <button class="btn btn-sm btn-ghost" onclick="exportAllData()" title="Export Excel">⬇ Excel</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-title">📊 Dashboard</div>

  <!-- Lifetime KPIs -->
  <div class="lifetime-grid" id="lifetimeKPIs"></div>

  <!-- Annual Charts -->
  <div class="chart-card">
    <div class="chart-title">Annual Income vs Outgoing vs Savings (S$)</div>
    <div class="chart-wrap"><canvas id="annualChart"></canvas></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div class="chart-card" style="margin-bottom:0">
      <div class="chart-title">Investment % of Income by Year</div>
      <div class="chart-wrap"><canvas id="invPctChart"></canvas></div>
    </div>
    <div class="chart-card" style="margin-bottom:0">
      <div class="chart-title">Savings Rate % by Year</div>
      <div class="chart-wrap"><canvas id="savingsChart"></canvas></div>
    </div>
  </div>

  <!-- Year drill-down -->
  <div class="drill-section">
    <div class="chart-title">📅 Year Drill-Down — click a year to explore</div>
    <div class="year-tabs" id="yearTabs"></div>
    <div id="drillContent"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let annualChart, invPctChart, savingsChart;
let selectedYear = null;

function fmt(n) { return Number(n||0).toLocaleString('en-SG',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtPct(n) { return Number(n||0).toFixed(1) + '%'; }

function getYears() {
  const recs = loadFinanceRecords();
  const years = [...new Set(recs.map(r=>r.year))].sort();
  return years;
}

function getAnnualTotals(year) {
  const recs = loadFinanceRecords().filter(r=>r.year===year);
  const cats = loadCategories();
  let income=0, outgoing=0, invested=0;
  recs.forEach(r => {
    if(r.type==='income') income += r.amount;
    else if(r.type==='expense'||r.type==='tax') outgoing += r.amount;
    else if(r.type==='investment') invested += r.amount;
  });
  return { income, outgoing, invested, savings: income - outgoing - invested };
}

function render() {
  const years = getYears();
  if(!years.length) {
    renderEmpty();
    return;
  }

  // Lifetime KPIs
  let ltIncome=0, ltOutgoing=0, ltInvested=0;
  years.forEach(y => {
    const t = getAnnualTotals(y);
    ltIncome += t.income; ltOutgoing += t.outgoing; ltInvested += t.invested;
  });
  const ltSavings = ltIncome - ltOutgoing - ltInvested;
  const ltSavRate = ltIncome > 0 ? (ltSavings/ltIncome*100) : 0;
  const ltInvRate = ltIncome > 0 ? (ltInvested/ltIncome*100) : 0;

  document.getElementById('lifetimeKPIs').innerHTML = `
    <div class="lkpi" style="border-color:var(--teal)">
      <div class="lkpi-label">Lifetime Income</div>
      <div class="lkpi-value" style="color:var(--teal)">S$ ${fmt(ltIncome)}</div>
      <div class="lkpi-sub">Across ${years.length} year${years.length>1?'s':''} (${years[0]}–${years[years.length-1]})</div>
    </div>
    <div class="lkpi" style="border-color:var(--red)">
      <div class="lkpi-label">Lifetime Outgoing</div>
      <div class="lkpi-value" style="color:var(--red)">S$ ${fmt(ltOutgoing)}</div>
      <div class="lkpi-sub">${fmtPct(ltIncome>0?ltOutgoing/ltIncome*100:0)} of total income</div>
    </div>
    <div class="lkpi" style="border-color:var(--yellow)">
      <div class="lkpi-label">Lifetime Invested</div>
      <div class="lkpi-value" style="color:var(--yellow)">S$ ${fmt(ltInvested)}</div>
      <div class="lkpi-sub">${fmtPct(ltInvRate)} of total income</div>
    </div>
    <div class="lkpi" style="border-color:var(--green)">
      <div class="lkpi-label">Lifetime Net Savings</div>
      <div class="lkpi-value" style="color:var(--green)">S$ ${fmt(ltSavings)}</div>
      <div class="lkpi-sub">Avg savings rate ${fmtPct(ltSavRate)}</div>
    </div>
    <div class="lkpi">
      <div class="lkpi-label">Years Tracked</div>
      <div class="lkpi-value" style="color:var(--text)">${years.length}</div>
      <div class="lkpi-sub">${years.join(', ')}</div>
    </div>
  `;

  // Chart data
  const annualData = years.map(y => getAnnualTotals(y));
  const incomes    = annualData.map(d=>d.income);
  const outgoings  = annualData.map(d=>d.outgoing);
  const investeds  = annualData.map(d=>d.invested);
  const savings    = annualData.map(d=>d.savings);
  const savRates   = annualData.map(d=>d.income>0?d.savings/d.income*100:0);
  const invRates   = annualData.map(d=>d.income>0?d.invested/d.income*100:0);

  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color:'#8b949e', font:{size:11} } },
      tooltip: { callbacks: { label: ctx => ` S$ ${fmt(ctx.raw)}` } }
    },
    scales: {
      x: { ticks:{color:'#8b949e'}, grid:{color:'rgba(255,255,255,0.05)'} },
      y: { ticks:{color:'#8b949e', callback:v=>'S$'+fmt(v)}, grid:{color:'rgba(255,255,255,0.05)'} }
    }
  };

  // Annual bar chart
  if(annualChart) annualChart.destroy();
  annualChart = new Chart(document.getElementById('annualChart'), {
    type: 'bar',
    data: {
      labels: years,
      datasets: [
        { label:'Income',   data:incomes,   backgroundColor:'rgba(6,138,145,0.75)',  borderRadius:4 },
        { label:'Outgoing', data:outgoings, backgroundColor:'rgba(248,81,73,0.65)',  borderRadius:4 },
        { label:'Invested', data:investeds, backgroundColor:'rgba(210,153,34,0.65)', borderRadius:4 },
        { label:'Savings',  data:savings,   backgroundColor:'rgba(63,185,80,0.65)',  borderRadius:4 },
      ]
    },
    options: {
      ...chartDefaults,
      plugins: {
        ...chartDefaults.plugins,
        tooltip: {
          callbacks: {
            label: ctx => {
              const inc = incomes[ctx.dataIndex];
              const pct = inc > 0 ? (ctx.raw/inc*100).toFixed(1) : 0;
              return ` S$ ${fmt(ctx.raw)}  (${pct}% of income)`;
            }
          }
        }
      }
    }
  });

  // Investment % chart
  if(invPctChart) invPctChart.destroy();
  invPctChart = new Chart(document.getElementById('invPctChart'), {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{ label:'Investment % of Income', data:invRates, backgroundColor:'rgba(210,153,34,0.75)', borderRadius:4 }]
    },
    options: {
      ...chartDefaults,
      plugins: { ...chartDefaults.plugins, tooltip:{ callbacks:{ label:ctx=>` ${ctx.raw.toFixed(1)}%` } } },
      scales: {
        x: chartDefaults.scales.x,
        y: { ticks:{color:'#8b949e', callback:v=>v+'%'}, grid:{color:'rgba(255,255,255,0.05)'} }
      }
    }
  });

  // Savings rate chart
  if(savingsChart) savingsChart.destroy();
  savingsChart = new Chart(document.getElementById('savingsChart'), {
    type: 'line',
    data: {
      labels: years,
      datasets: [{ label:'Savings Rate %', data:savRates, borderColor:'#3fb950', backgroundColor:'rgba(63,185,80,0.1)', tension:0.3, fill:true, pointBackgroundColor:'#3fb950', pointRadius:5 }]
    },
    options: {
      ...chartDefaults,
      plugins: { ...chartDefaults.plugins, tooltip:{ callbacks:{ label:ctx=>` ${ctx.raw.toFixed(1)}%` } } },
      scales: {
        x: chartDefaults.scales.x,
        y: { ticks:{color:'#8b949e', callback:v=>v+'%'}, grid:{color:'rgba(255,255,255,0.05)'} }
      }
    }
  });

  // Year tabs
  if(!selectedYear || !years.includes(selectedYear)) selectedYear = years[years.length-1];
  const tabsEl = document.getElementById('yearTabs');
  tabsEl.innerHTML = years.map(y=>`<button class="year-tab ${y===selectedYear?'active':''}" onclick="selectYear(${y})">${y}</button>`).join('');
  renderDrill(selectedYear);
}

function selectYear(y) {
  selectedYear = y;
  document.querySelectorAll('.year-tab').forEach(b=>b.classList.toggle('active', parseInt(b.textContent)===y));
  renderDrill(y);
}

function renderDrill(year) {
  const t = getAnnualTotals(year);
  const recs = loadFinanceRecords().filter(r=>r.year===year);
  const cats = loadCategories();
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Monthly income/outgoing
  const monthly = MONTHS.map((_,i)=>{
    const m = i+1;
    const inc = recs.filter(r=>r.month===m&&r.type==='income').reduce((s,r)=>s+r.amount,0);
    const out = recs.filter(r=>r.month===m&&(r.type==='expense'||r.type==='tax')).reduce((s,r)=>s+r.amount,0);
    const inv = recs.filter(r=>r.month===m&&r.type==='investment').reduce((s,r)=>s+r.amount,0);
    const sav = inc - out - inv;
    const savPct = inc>0?(sav/inc*100):0;
    return {inc,out,inv,sav,savPct};
  });

  // Income by category
  const incCats = cats.filter(c=>c.section==='incoming');
  const outGroups = ['Living','Insurance','Taxes','Investments'];

  let html = `
    <!-- Year summary KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
      <div class="lkpi" style="border-color:var(--teal)"><div class="lkpi-label">Income ${year}</div><div class="lkpi-value" style="color:var(--teal);font-size:1.1rem">S$ ${fmt(t.income)}</div></div>
      <div class="lkpi" style="border-color:var(--red)"><div class="lkpi-label">Outgoing ${year}</div><div class="lkpi-value" style="color:var(--red);font-size:1.1rem">S$ ${fmt(t.outgoing)}</div><div class="lkpi-sub">${fmtPct(t.income>0?t.outgoing/t.income*100:0)} of income</div></div>
      <div class="lkpi" style="border-color:var(--yellow)"><div class="lkpi-label">Invested ${year}</div><div class="lkpi-value" style="color:var(--yellow);font-size:1.1rem">S$ ${fmt(t.invested)}</div><div class="lkpi-sub">${fmtPct(t.income>0?t.invested/t.income*100:0)} of income</div></div>
      <div class="lkpi" style="border-color:var(--green)"><div class="lkpi-label">Net Savings ${year}</div><div class="lkpi-value" style="color:var(--green);font-size:1.1rem">S$ ${fmt(t.savings)}</div><div class="lkpi-sub">Savings rate ${fmtPct(t.income>0?t.savings/t.income*100:0)}</div></div>
    </div>

    <!-- Monthly cashflow table -->
    <div style="overflow-x:auto;margin-bottom:20px">
      <table style="width:100%;border-collapse:collapse;font-size:0.83rem">
        <thead><tr>
          <th style="text-align:left;padding:8px 10px;color:var(--text-muted);background:var(--bg3)">Metric</th>
          ${MONTHS.map(m=>`<th style="padding:8px 10px;color:var(--text-muted);background:var(--bg3)">${m}</th>`).join('')}
          <th style="padding:8px 10px;color:var(--text-muted);background:var(--bg3)">YTD</th>
        </tr></thead>
        <tbody>
          <tr>
            <td style="padding:7px 10px;font-weight:600">Income</td>
            ${monthly.map(m=>`<td style="padding:7px 10px;text-align:right">${fmt(m.inc)}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700">${fmt(t.income)}</td>
          </tr>
          <tr>
            <td style="padding:7px 10px;font-weight:600">Outgoing</td>
            ${monthly.map(m=>`<td style="padding:7px 10px;text-align:right;color:var(--red)">${fmt(m.out)}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:var(--red)">${fmt(t.outgoing)}</td>
          </tr>
          <tr>
            <td style="padding:7px 10px;font-weight:600">Invested</td>
            ${monthly.map(m=>`<td style="padding:7px 10px;text-align:right;color:var(--yellow)">${fmt(m.inv)}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:var(--yellow)">${fmt(t.invested)}</td>
          </tr>
          <tr style="background:var(--bg3);border-top:1px solid var(--border2)">
            <td style="padding:7px 10px;font-weight:700">Net Savings</td>
            ${monthly.map(m=>`<td style="padding:7px 10px;text-align:right;font-weight:600;color:${m.sav>=0?'var(--green)':'var(--red)'}">${fmt(m.sav)}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:${t.savings>=0?'var(--green)':'var(--red)'}">${fmt(t.savings)}</td>
          </tr>
          <tr>
            <td style="padding:7px 10px;font-weight:600;color:var(--text-muted)">Savings %</td>
            ${monthly.map(m=>`<td style="padding:7px 10px;text-align:right;font-size:0.78rem;color:${m.savPct>=20?'var(--green)':m.savPct>0?'var(--yellow)':'var(--text-muted)'}">${m.savPct.toFixed(0)}%</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-size:0.78rem;font-weight:700;color:${t.income>0&&t.savings/t.income>=0.2?'var(--green)':'var(--yellow)'}">${fmtPct(t.income>0?t.savings/t.income*100:0)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Income breakdown -->
    <details style="margin-bottom:12px">
      <summary>Income Breakdown — ${year}</summary>
      <div class="details-content" style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem">
          <thead><tr>
            <th style="text-align:left;padding:7px 10px;color:var(--text-muted)">Category</th>
            ${MONTHS.map(m=>`<th style="padding:7px 10px;color:var(--text-muted)">${m}</th>`).join('')}
            <th style="padding:7px 10px;color:var(--text-muted)">YTD</th>
          </tr></thead>
          <tbody>
            ${incCats.map(cat=>{
              const vals = MONTHS.map((_,i)=>recs.filter(r=>r.month===i+1&&r.category===cat.category).reduce((s,r)=>s+r.amount,0));
              const ytd = vals.reduce((a,b)=>a+b,0);
              return `<tr><td style="padding:6px 10px;font-weight:500">${cat.category}</td>${vals.map(v=>`<td style="padding:6px 10px;text-align:right">${fmt(v)}</td>`).join('')}<td style="padding:6px 10px;text-align:right;font-weight:700">${fmt(ytd)}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </details>

    <!-- Outgoing breakdown -->
    <details>
      <summary>Outgoing Breakdown — ${year}</summary>
      <div class="details-content" style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem">
          <thead><tr>
            <th style="text-align:left;padding:7px 10px;color:var(--text-muted)">Category</th>
            ${MONTHS.map(m=>`<th style="padding:7px 10px;color:var(--text-muted)">${m}</th>`).join('')}
            <th style="padding:7px 10px;color:var(--text-muted)">YTD</th>
          </tr></thead>
          <tbody>
            ${outGroups.map(grp=>{
              const grpCats = cats.filter(c=>c.section==='outgoing'&&c.group===grp);
              if(!grpCats.length) return '';
              return `<tr style="background:rgba(6,138,145,0.08)"><td colspan="${14}" style="padding:5px 10px;color:var(--teal);font-weight:700;font-size:0.78rem;text-transform:uppercase">${grp}</td></tr>`
                + grpCats.map(cat=>{
                  const vals = MONTHS.map((_,i)=>recs.filter(r=>r.month===i+1&&r.category===cat.category).reduce((s,r)=>s+r.amount,0));
                  const ytd = vals.reduce((a,b)=>a+b,0);
                  return `<tr><td style="padding:6px 10px;padding-left:20px">${cat.category}</td>${vals.map(v=>`<td style="padding:6px 10px;text-align:right">${fmt(v)}</td>`).join('')}<td style="padding:6px 10px;text-align:right;font-weight:700">${fmt(ytd)}</td></tr>`;
                }).join('');
            }).join('')}
          </tbody>
        </table>
      </div>
    </details>
  `;

  document.getElementById('drillContent').innerHTML = html;
}

function renderEmpty() {
  document.getElementById('lifetimeKPIs').innerHTML = `
    <div class="lkpi" style="grid-column:1/-1;text-align:center;padding:40px">
      <div class="lkpi-label">No data yet</div>
      <div style="color:var(--text-muted);margin-top:8px">Go to <a href="input.html" style="color:var(--teal)">Finance Input</a> to start entering your data.</div>
    </div>`;
  document.getElementById('drillContent').innerHTML = '';
  document.getElementById('yearTabs').innerHTML = '';
}


// ── Refresh from Drive ────────────────────────────────────
async function refreshFromDrive() {
  const overlay = document.getElementById('loadingOverlay');
  const msg = document.getElementById('loadingMsg');
  if (overlay) { overlay.style.display='flex'; overlay.style.opacity='1'; }
  if (msg) msg.textContent = 'Refreshing from Google Drive…';
  await loadFromDrive();
}

window.onDataLoaded = render;
</script>
</body>
</html>
